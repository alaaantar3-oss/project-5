<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sun glasses shop</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
</head>
<body>


<div class="parent">
        <div class="sun-glasses">
            <input type="text" id="search" placeholder="search for products... ">
        </div>
        
        <ul class="list">
            <li>
                <div class="img">
                    <img src="imges/img1.jpg" alt="" width="300">
                </div>
                <div class="name">Prada</div>
                <div class="price">Price:3000$</div>
                <button price="3000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img">
                    <img src="imges/img2.jpg" alt="" width="300">
                </div>
                <div class="name">Ray-Ban</div>
                <div class="price">Price:4000$</div>
                <button price="4000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img">
                    <img src="imges/img3.jpg" alt="" width="300">
                </div>
                <div class="name">Dior</div>
                <div class="price">Price:5000$</div>
                <button price="5000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img">
                    <img src="imges/img4.jpg" alt="" width="300">
                </div>
                <div class="name">Chanel</div>
                <div class="price">Price:6000$</div>
                <button price="6000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img">
                    <img src="imges/img5.jpg" alt="" width="300">
                </div>
                <div class="name">Persol</div>
                <div class="price">Price:7000$</div>
                <button price="7000" class="shop">Shop</button>
            </li>
            <li>
                <div class="img">
                    <img src="imges/img6.jpg" alt="" width="400">
                </div>
                <div class="name">Gucci</div>
                <div class="price">Price:8000$</div>
                <button price="8000" class="shop">Shop</button>
            </li>
            
            <p id="error">العنصر الذي تبحث عنه غير موجود</p>
        </ul>

        <div id="cart" style="display: none;"></div>


        <div id="contBtn" style="display: none;">
            <button id="clear">Clear</button>
            <button id="showPrice">Show Price</button>
        </div>

        <div id="cartPrice" style="display: none;">Total Price:330,000$</div>
        
    </div>

















    <script src="js/script.js"></script>
</body>
</html>
